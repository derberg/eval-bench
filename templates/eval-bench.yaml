# eval-bench configuration
# See https://github.com/derberg/eval-bench/blob/main/docs/config.md

plugin:
  path: ./

provider:
  command: claude
  timeout: 180
  model: claude-opus-4-7
  # Each Claude run gets its own working dir under the snapshot. By default
  # that's "{{snapshots_dir}}/{{snapshot_name}}/{{variant}}/{{prompt_id}}/{{sample}}",
  # so any files the model writes land alongside snapshot.json instead of in
  # your repo. Override with a custom path template, or set `cwd: null` to
  # inherit the cwd of the `eb` process (legacy behavior).
  # cwd: "{{snapshots_dir}}/{{snapshot_name}}/{{variant}}/{{prompt_id}}/{{sample}}"

judge:
  provider: ollama
  model: qwen2.5:14b
  endpoint: http://localhost:11434
  temperature: 0
  maxTokens: 1024

runs:
  samples: 3
  parallel: 2

snapshots:
  dir: ./.eval-bench/snapshots
